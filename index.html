<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MHT Designer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background: #00ffd5;
            color: #111;
            padding: 30px 0;
        }
        header h1 {
            margin: 0;
            font-size: 50px;
        }
        header p {
            margin: 5px 0 0;
            font-size: 20px;
        }
        section {
            padding: 50px 20px;
        }
        .portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .portfolio img {
            width: 100%;
            border-radius: 10px;
        }
        .order-button {
            background: #00ffd5;
            color: #111;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 30px;
        }
        footer {
            background: #222;
            color: #aaa;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<header>
    <h1>MHT Designer</h1>
    <p>Professional Logo Design & Branding Services</p>
</header>

<section>
    <h2>My Portfolio</h2>
    <div class="portfolio">
        <img src="https://via.placeholder.com/300x200.png?text=Logo+1" alt="Logo 1">
        <img src="https://via.placeholder.com/300x200.png?text=Logo+2" alt="Logo 2">
        <img src="https://via.placeholder.com/300x200.png?text=Logo+3" alt="Logo 3">
        <img src="https://via.placeholder.com/300x200.png?text=Logo+4" alt="Logo 4">
    </div>

    <a href="https://wa.me/923316525133" class="order-button">Order Logo on WhatsApp</a>
</section>

<footer>
    &copy; 2026 MHT Designer. All Rights Reserved.
</footer>

</body>
  </html>
