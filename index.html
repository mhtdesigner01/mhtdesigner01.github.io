<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHT Designer | 3D Welcome</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1e1e2f, #000); font-family: sans-serif; }
        #content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: white; z-index: 10;
        }
        img { width: 150px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 0 20px #ff4757; }
        h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(255, 71, 87, 0.8); }
        p { letter-spacing: 2px; color: #ccc; }
    </style>
</head>
<body>

    <div id="content">
        <img src="MHT Designer Logo.png" alt="Logo">
        <h1>Welcome To Anime World</h1>
        <p>MHT DESIGNER SERVICES</p>
    </div>

    <script>
        // 3D Particles Background
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const starGeo = new THREE.SphereGeometry(0.05, 24, 24);
        const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        for(let i=0; i<500; i++) {
            const star = new THREE.Mesh(starGeo, starMat);
            const [x, y, z] = Array(3).fill().map(() => THREE.MathUtils.randFloatSpread(100));
            star.position.set(x, y, z);
            scene.add(star);
        }

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
